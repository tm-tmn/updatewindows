<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Windows - Service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode"> 

    <div class="container py-4">
        
        <div class="row align-items-center mb-4 header-section g-0">
            <div class="col-2"></div>

            <div class="col-8 text-center">
                <h2 class="m-0">Update Windows</h2>
            </div>

            <div class="col-2 d-flex justify-content-end gap-2 pr-0">
                <button id="dashboardToggle" class="btn btn-icon btn-dashboard shadow-sm" data-bs-toggle="modal" data-bs-target="#dashboardModal">
                    <i class="bi bi-bar-chart-line-fill"></i>
                </button>
                <button id="themeToggle" class="btn btn-icon btn-theme shadow-sm">
                    <i id="themeIcon" class="bi bi-moon-stars-fill"></i>
                </button>
            </div>
        </div>

        <div class="card filter-card mb-5">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-12 col-md-4">
                        <label for="engineerFilter" class="form-label small fw-bold">Service Name</label>
                        <select id="engineerFilter" class="form-select">
                            <option value="">กำลังโหลดข้อมูล...</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-8">
                        <label for="searchInput" class="form-label small fw-bold">Search</label>
                        <input type="text" id="searchInput" class="form-control" placeholder="ค้นหา S/N หรือชื่อลูกค้า...">
                    </div>
                </div>
        
                <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input" type="checkbox" id="hideCompletedSwitch">
                        <label class="form-check-label small fw-bold text-muted" for="hideCompletedSwitch">
                            ซ่อนรายการที่บันทึกสำเร็จ
                        </label>
                    </div>
                    <div class="small fw-bold">
                        <span class="text-muted">แสดงทั้งหมด:</span> 
                        <span id="itemCount" class="badge bg-primary rounded-pill">0</span> 
                        <span class="text-muted">รายการ</span>
                    </div>
                </div>
            </div>
        </div>

        
        <div id="statusMessage" class="text-center my-3"></div>
        <div id="deviceList" class="row g-4">
            </div>
    </div>

    <div class="modal fade" id="dashboardModal" tabindex="-1" aria-labelledby="dashboardModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered"> <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header border-bottom-0 pt-4 px-4">
                    <h5 class="modal-title fw-bold fs-4" id="dashboardModalLabel">
                        <i class="bi bi-bar-chart-line-fill"></i> สรุปภาพรวม Update Windows
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row g-4">
                        <div class="col-12 col-md-4 text-center">
                            <div class="card h-100 border-0 bg-light-subtle rounded-4 p-3 shadow-sm">
                                <h6 class="fw-bold mb-3">ความคืบหน้าภาพรวม (%)</h6>
                                <div style="height: 250px; width: 100%;">
                                    <canvas id="progressPieChart"></canvas>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 col-md-8">
                            <div class="card h-100 border-0 bg-light-subtle rounded-4 p-3 shadow-sm">
                                <h6 class="fw-bold mb-3">ผลสรุปรายช่าง (สำเร็จ / ทั้งหมด)</h6>
                                <div style="height: 250px; width: 100%;">
                                    <canvas id="engineerBarChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row g-4 mt-2">
                        <div class="col-12">
                            <div class="card border-0 bg-light-subtle rounded-4 p-4 shadow-sm">
                                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                                    <h6 class="fw-bold m-0">
                                        <i class="bi bi-cpu-fill text-primary me-2"></i>ความคืบหน้าแยกตาม Model
                                    </h6>
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="small text-muted fw-bold text-nowrap">ตัวกรองช่าง:</span>
                                        <select id="modelEngineerFilter" class="form-select form-select-sm shadow-sm" style="min-width: 180px;" onchange="calculateAndRenderStats()">
                                            </select>
                                    </div>
                                </div>
                                <div style="height: 350px; width: 100%;">
                                    <canvas id="modelBarChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
