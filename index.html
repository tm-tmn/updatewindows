<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Windows - Service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode"> 

    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="m-0">Update Windows</h2>
            <button id="themeToggle" class="btn btn-theme shadow-sm">
                <i id="themeIcon" class="bi bi-moon-stars-fill"></i>
            </button>
        </div>

        <div class="card filter-card mb-4">
            <div class="card-body">
                <div class="mb-3">
                    <label for="engineerFilter" class="form-label fw-bold">Service Name</label>
                    <select id="engineerFilter" class="form-select">
                        <option value="">กำลังโหลดข้อมูล...</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="searchInput" class="form-label fw-bold">Search</label>
                    <input type="text" id="searchInput" class="form-control" placeholder="พิมพ์ S/N หรือชื่อลูกค้า...">
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="hideCompletedSwitch">
                    <label class="form-check-label small fw-bold" for="hideCompletedSwitch">ซ่อนรายการที่บันทึกแล้ว</label>
                </div>
            </div>
        </div>

        <div id="statusMessage" class="text-center my-3"></div>
        <div id="deviceList" class="row g-3"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
