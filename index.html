<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Windows - Service System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container-fluid py-4">
    <h2 class="text-center mb-4">Update Windows</h2>
    
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="mb-3">
                <label for="engineerFilter" class="form-label fw-bold">Service Name</label>
                <select id="engineerFilter" class="form-select form-select-lg">
                    <option value="">Loading...</option>
                </select>
            </div>
            
            <div class="">
                <label for="searchInput" class="form-label fw-bold">Search</label>
                <input type="text" id="searchInput" class="form-control">
            </div>

            <div class="mt-3 form-check form-switch">
                <input class="form-check-input" type="checkbox" id="hideCompletedSwitch">
                <label class="form-check-label fw-bold" for="hideCompletedSwitch">
                    ซ่อนรายการที่บันทึกแล้ว
                </label>
            </div>
        </div>
    </div>

    <div id="statusMessage" class="text-center my-3"></div>
    <div id="deviceList" class="row g-3"></div>
</div>

<script src="Script.js"></script>
</body>
</html>
